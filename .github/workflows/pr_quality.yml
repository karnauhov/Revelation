name: PR Quality

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.7"
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Format check
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Unit tests
        run: flutter test --exclude-tags widget

      - name: Widget tests
        run: flutter test --tags widget

      - name: Forbidden pattern checks
        run: dart run scripts/check_forbidden_patterns.dart
