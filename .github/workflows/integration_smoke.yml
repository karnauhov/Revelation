name: Integration Smoke

on:
  schedule:
    # Weekly nightly run (Monday 02:00 UTC).
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      reason:
        description: "Optional reason for manual integration smoke run"
        required: false
        type: string

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.7"
          cache: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Run integration smoke suite on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_7
          script: |
            flutter devices
            for test_file in integration_test/smoke/*_test.dart; do
              echo "Running ${test_file}"
              flutter test -d emulator-5554 "${test_file}"
            done
