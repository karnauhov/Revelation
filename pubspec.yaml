name: revelation
description: "Revelation Study app."
publish_to: 'none'
version: 1.0.7+160
environment:
  sdk: ^3.9.0

dependencies:
  sentry_flutter: ^9.19.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # flutter.dev packages
  cupertino_icons: ^1.0.8
  go_router: ^17.0.1 
  flutter_svg: ^2.2.3
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.4
  path_provider: ^2.1.5

  # dart.dev packages
  web: ^1.1.1
  intl: ^0.20.2

  # 3d party packages
  get_it: ^8.3.0
  flutter_bloc: ^9.1.1
  package_info_plus: ^9.0.0
  device_info_plus: ^12.3.0
  xml: ^6.6.1
  flutter_markdown_plus: ^1.0.7
  float_column: ^4.0.3
  styled_text: ^8.1.0
  supabase_flutter: ^2.12.0
  flutter_colorpicker: ^1.1.0
  flutter_inappwebview: ^6.1.5
  vector_math: ^2.2.0
  image: ^4.7.2
  audioplayers: ^6.6.0
  drift: ^2.30.1
  drift_flutter: ^0.2.8
  unorm_dart: ^0.3.2
  talker_flutter: ^5.1.12
  pdf: ^3.12.0

dev_dependencies:
  sentry_dart_plugin: ^3.3.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  app_build_timestamp_transformer:
    path: tools/app_build_timestamp_transformer

  # flutter.dev packages
  flutter_lints: ^6.0.0

  # dart.dev packages
  build_runner: ^2.10.5

  # 3d party packages
  flutter_launcher_icons: ^0.14.4
  msix: ^3.16.9
  drift_dev: ^2.30.1

msix_config:
  display_name: Revelation.Win
  identity_name: AI11.RevelationWin
  publisher_display_name: AI11
  publisher: CN=B37F48EC-C643-42C2-82FB-3DFB514F5E74
  languages: en, es, uk, ru
  store: true
  msix_version: 1.0.167.0
  logo_path: .\assets\images\UI\app_icon.png

flutter:
  generate: true
  uses-material-design: true
  assets:
    - CHANGELOG.md
    - assets/favicon.ico
    - assets/data/
    - assets/data/markdown/markdown_youtube_player.html
    - path: assets/meta/app_build_timestamp.txt
      transformers:
        - package: app_build_timestamp_transformer
    - assets/images/UI/
    - assets/sounds/

  fonts:
    - family: Arimo
      fonts:
        - asset: assets/fonts/Arimo/Arimo.ttf
          weight: 400
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans/NotoSans-Regular.ttf
          weight: 400
    - family: NotoSansCoptic
      fonts:
        - asset: assets/fonts/NotoSansCoptic/NotoSansCoptic-Regular.ttf
          weight: 400
    - family: NotoSansSymbols2
      fonts:
        - asset: assets/fonts/NotoSansSymbols2/NotoSansSymbols2-Regular.ttf
          weight: 400

sentry:
  upload_debug_symbols: true
  upload_source_maps: true
  upload_sources: true
  commits: false
  project: revelation-flutter
  org: ai11-link
